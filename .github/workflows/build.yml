name: Build QuantumPlayer

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────
  #  LINUX
  # ─────────────────────────────────────────
  build-linux:
    name: Linux (Ubuntu 22.04)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6 + audio deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake build-essential ninja-build curl \
            qt6-base-dev \
            libgl1-mesa-dev \
            libasound2-dev \
            libpulse-dev

      - name: Install Qt6 (multimedia not needed anymore)
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.2'
          host: 'linux'
          target: 'desktop'
          arch: 'gcc_64'
          cache: true

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: QuantumPlayer-Linux
          path: build/QuantumPlayer
          if-no-files-found: error

  # ─────────────────────────────────────────
  #  WINDOWS
  # ─────────────────────────────────────────
  build-windows:
    name: Windows (MSVC 2022)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Configure
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt
        run: |
          mkdir deploy
          copy build\Release\QuantumPlayer.exe deploy\
          windeployqt --release deploy\QuantumPlayer.exe

      - uses: actions/upload-artifact@v4
        with:
          name: QuantumPlayer-Windows
          path: deploy\
          if-no-files-found: error

  # ─────────────────────────────────────────
  #  macOS
  # ─────────────────────────────────────────
  build-macos:
    name: macOS (Ventura)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.2'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          cache: true

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Deploy
        run: macdeployqt build/QuantumPlayer.app -dmg

      - uses: actions/upload-artifact@v4
        with:
          name: QuantumPlayer-macOS
          path: build/QuantumPlayer.dmg
          if-no-files-found: error

  # ─────────────────────────────────────────
  #  RELEASE on tag
  # ─────────────────────────────────────────
  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: |
          cd artifacts/QuantumPlayer-Linux
          chmod +x QuantumPlayer
          zip -r ../QuantumPlayer-Linux.zip .
          cd ../QuantumPlayer-Windows
          zip -r ../QuantumPlayer-Windows.zip .

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/QuantumPlayer-Linux.zip
            artifacts/QuantumPlayer-Windows.zip
            artifacts/QuantumPlayer-macOS/QuantumPlayer.dmg
          generate_release_notes: true
